<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T 字物体转动演示</title>
  </head>
  <body>
    <main id="app">
      <aside class="control-panel" aria-label="模拟控制">
        <header class="app-title">
          <span class="title-mark"></span>
          <div>
            <h1>T 字物体转动</h1>
            <p>自由刚体 Euler 方程</p>
          </div>
        </header>

        <section class="control-section">
          <div class="section-heading">
            <h2>初始角速度</h2>
            <span>rad/s</span>
          </div>
          <div class="vector-inputs">
            <label>
              <span class="math-inline omega-label" data-latex="\omega_{\textstyle 1}"></span>
              <input id="omegaX" type="number" step="0.01" value="0.04" />
            </label>
            <label>
              <span class="math-inline omega-label" data-latex="\omega_{\textstyle 2}"></span>
              <input id="omegaY" type="number" step="0.01" value="4.30" />
            </label>
            <label>
              <span class="math-inline omega-label" data-latex="\omega_{\textstyle 3}"></span>
              <input id="omegaZ" type="number" step="0.01" value="0.06" />
            </label>
          </div>
          <div class="preset-row" role="group" aria-label="预设">
            <button class="preset-button active" data-preset="middle">中间轴</button>
            <button class="preset-button" data-preset="min">最小轴</button>
            <button class="preset-button" data-preset="max">最大轴</button>
          </div>
        </section>

        <section class="control-section">
          <div class="section-heading">
            <h2>模拟</h2>
            <span id="simTime"></span>
          </div>
          <div class="button-row">
            <button id="playPause" class="primary-button">
              <i data-lucide="pause"></i>
              <span>暂停</span>
            </button>
            <button id="resetSimulation" class="icon-button" aria-label="应用初值并重置">
              <i data-lucide="rotate-ccw"></i>
            </button>
          </div>
        </section>

        <section class="control-section">
          <div class="section-heading">
            <h2>固定惯量张量</h2>
            <span>主轴系</span>
          </div>
          <div class="inertia-grid">
            <div><span class="math-inline" data-latex="I_1"></span><strong>1.00</strong></div>
            <div><span class="math-inline" data-latex="I_2"></span><strong>2.00</strong></div>
            <div><span class="math-inline" data-latex="I_3"></span><strong>3.20</strong></div>
          </div>
        </section>

        <section class="metric-section" aria-label="守恒量">
          <div class="metric">
            <span>动能漂移</span>
            <strong id="energyDrift">0.00 ppm</strong>
          </div>
          <div class="metric">
            <span>角动量漂移</span>
            <strong id="momentumDrift">0.00 ppm</strong>
          </div>
          <div class="metric">
            <span class="math-inline ratio-label" data-latex="L^2 / 2T"></span>
            <strong id="ratioValue">2.00</strong>
          </div>
          <div class="metric">
            <span>中间轴偏转</span>
            <strong id="flipAngle">0°</strong>
          </div>
        </section>

      </aside>

      <section class="stage">
        <div class="view view-main">
          <div class="view-header">
            <div>
              <h2>刚体姿态</h2>
              <span id="omegaReadout"></span>
            </div>
            <span class="axis-key">
              <b class="x"></b><span class="math-inline" data-latex="x"></span>
              <b class="y"></b><span class="math-inline" data-latex="y"></span>
              <b class="z"></b><span class="math-inline" data-latex="z"></span>
            </span>
          </div>
          <div id="bodyViewport" class="viewport">
            <div
              class="equation-overlay"
              data-latex="\begin{aligned}I_1\dot{\omega}_1&=(I_2-I_3)\omega_2\omega_3\\I_2\dot{\omega}_2&=(I_3-I_1)\omega_3\omega_1\\I_3\dot{\omega}_3&=(I_1-I_2)\omega_1\omega_2\end{aligned}"
            ></div>
          </div>
        </div>

        <div class="view view-phase">
          <div class="view-header">
            <div>
              <h2>角速度空间</h2>
              <span>T与L²守恒曲面</span>
            </div>
          </div>
          <div id="omegaViewport" class="viewport">
            <div
              class="equation-overlay"
              data-latex="\begin{aligned}2T&=I_1\omega_1^2+I_2\omega_2^2+I_3\omega_3^2\\L^2&=I_1^2\omega_1^2+I_2^2\omega_2^2+I_3^2\omega_3^2\end{aligned}"
            ></div>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
